name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  MIN_TESTS: 500  # Minimum tests required for release
  MAX_TEST_FAIL_RATE: 0.0  # No failures allowed for release

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo check (legacy-cli feature)
        run: cargo check --features legacy-cli

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test
        run: cargo test --workspace --all-features -- --test-threads=1

      - name: cargo test (legacy-cli feature)
        run: cargo test --features legacy-cli

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests and count
        id: test_count
        run: |
          cargo test --workspace --all-features -- --list 2>/dev/null | grep -c "test" > test_count.txt
          echo "Test count: $(cat test_count.txt)"

      - name: Check test count meets minimum
        run: |
          COUNT=$(cat test_count.txt)
          MIN=${{ env.MIN_TESTS }}
          if [ "$COUNT" -lt "$MIN" ]; then
            echo "ERROR: Test count $COUNT is below minimum $MIN"
            exit 1
          fi
          echo "Test count $COUNT meets minimum $MIN"

      - name: cargo doc
        run: |
          cargo doc --workspace --all-features --no-deps

      - name: Validate docs and source structure
        run: bash scripts/validate_docs.sh

      - name: git diff whitespace check
        run: git diff --check

      - name: Prevent placeholder gate reporting
        run: |
          if grep -R -nE 'placeholder[[:space:]_-]*[c]heck|actual implementation [w]ould|if benchmarks [p]ass' .github/workflows; then
            echo "CI quality gates must not contain placeholder PASS reporting."
            exit 1
          fi

      - name: Generate quality gates report
        run: |
          echo "=== Quality Gates Report ==="
          echo "G0: Compiles - PASS"
          echo "G1: Tests Pass - PASS"
          echo "G2: Lint Clean - PASS"
          echo "G3: Docs Aligned - PASS"
          echo "G4: Source Structure - PASS"
          echo "G5: Whitespace/Diff Hygiene - PASS"
          echo "Test count: $(cat test_count.txt)"
          echo ""
          echo "All gates above ran successfully before this report."

  release:
    name: Release Artifact
    runs-on: ubuntu-latest
    needs: [quality-gates]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --workspace --all-features

      - name: Smoke test release binary
        run: ./target/release/priority-agent --help >/tmp/priority-agent-help.txt

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="main-${GITHUB_SHA::12}"
          fi
          artifact_dir="dist/priority-agent-${version}-linux-x86_64"
          mkdir -p "$artifact_dir"
          cp target/release/priority-agent "$artifact_dir/"
          cp README.md QUICKSTART.md "$artifact_dir/"
          tar -C dist -czf "${artifact_dir}.tar.gz" "$(basename "$artifact_dir")"
          shasum -a 256 "${artifact_dir}.tar.gz" > "${artifact_dir}.tar.gz.sha256"
          echo "artifact=${artifact_dir}.tar.gz" >> "$GITHUB_ENV"
          echo "checksum=${artifact_dir}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: priority-agent-${{ github.ref_name }}-linux-x86_64
          path: |
            ${{ env.artifact }}
            ${{ env.checksum }}

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ${{ env.artifact }}
            ${{ env.checksum }}

      - name: Release artifact summary
        run: |
          echo "Built and uploaded ${{ env.artifact }}"
          echo "Checksum: ${{ env.checksum }}"
