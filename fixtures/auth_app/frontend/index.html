<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Auth Todo App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .auth-form { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .todo-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .todo-item.done { text-decoration: line-through; color: #999; }
        .hidden { display: none; }
        .error { color: red; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Todo App</h1>
    
    <div id="auth-section">
        <div class="auth-form" id="login-form">
            <h3>Login</h3>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="showRegister()">Need account?</button>
            <div id="login-error" class="error"></div>
        </div>
        
        <div class="auth-form hidden" id="register-form">
            <h3>Register</h3>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="password" id="reg-password" placeholder="Password">
            <button onclick="register()">Register</button>
            <button onclick="showLogin()">Have account?</button>
            <div id="reg-error" class="error"></div>
        </div>
    </div>
    
    <div id="app-section" class="hidden">
        <p>Welcome, <span id="current-user"></span>! <button onclick="logout()">Logout</button></p>
        <form id="todo-form" onsubmit="addTodo(event)">
            <input type="text" id="todo-text" placeholder="New todo..." required>
            <button type="submit">Add</button>
        </form>
        <div id="todos"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
