      # Backend tests
      cat > fixtures/auth_app/backend/test_app.py <<'PY'
      import unittest
      import json
      import threading
      import urllib.request
      import time
      import sys
      import os
      sys.path.insert(0, os.path.dirname(__file__))
      import app

      class AuthAppTest(unittest.TestCase):
          @classmethod
          def setUpClass(cls):
              cls.server = app.HTTPServer(('127.0.0.1', 8081), app.AppHandler)
              cls.base = 'http://127.0.0.1:8081'
              cls.thread = threading.Thread(target=cls.server.serve_forever, daemon=True)
              cls.thread.start()
              time.sleep(0.5)

          @classmethod
          def tearDownClass(cls):
              cls.server.shutdown()

          def setUp(self):
              app.users.clear()
              app.todos.clear()
              app.sessions.clear()

          def register(self, user, pwd):
              req = urllib.request.Request(
                  self.base + '/register',
                  data=json.dumps({"username": user, "password": pwd}).encode(),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              return urllib.request.urlopen(req)

          def login(self, user, pwd):
              req = urllib.request.Request(
                  self.base + '/login',
                  data=json.dumps({"username": user, "password": pwd}).encode(),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              return urllib.request.urlopen(req)

          def test_register(self):
              resp = self.register("alice", "secret123")
              self.assertEqual(resp.status, 201)
              data = json.loads(resp.read())
              self.assertEqual(data["username"], "alice")

          def test_login_returns_token(self):
              self.register("alice", "secret123")
              resp = self.login("alice", "secret123")
              self.assertEqual(resp.status, 200)
              data = json.loads(resp.read())
              self.assertIn("token", data)
              self.assertTrue(len(data["token"]) > 0)

          def test_protected_without_auth(self):
              req = urllib.request.Request(self.base + '/todos')
              try:
                  urllib.request.urlopen(req)
                  self.fail("Should require auth")
              except urllib.error.HTTPError as e:
                  self.assertEqual(e.code, 401)

          def test_todo_crud(self):
              # Register and login
              self.register("alice", "secret123")
              resp = self.login("alice", "secret123")
              token = json.loads(resp.read())["token"]

              # Create todo
              req = urllib.request.Request(
                  self.base + '/todos',
                  data=json.dumps({"text": "Buy milk"}).encode(),
                  headers={'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                  method='POST'
              )
              resp = urllib.request.urlopen(req)
              self.assertEqual(resp.status, 201)

              # List todos
              req = urllib.request.Request(
                  self.base + '/todos',
                  headers={'Authorization': 'Bearer ' + token}
              )
              resp = urllib.request.urlopen(req)
              todos = json.loads(resp.read())
              self.assertEqual(len(todos), 1)
              self.assertEqual(todos[0]["text"], "Buy milk")

          def test_user_isolation(self):
              # Register two users
              self.register("alice", "secret123")
              self.register("bob", "secret456")
              resp_a = self.login("alice", "secret123")
              resp_b = self.login("bob", "secret456")
              token_a = json.loads(resp_a.read())["token"]
              token_b = json.loads(resp_b.read())["token"]

              # Alice creates todo
              req = urllib.request.Request(
                  self.base + '/todos',
                  data=json.dumps({"text": "Alice task"}).encode(),
                  headers={'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token_a},
                  method='POST'
              )
              urllib.request.urlopen(req)

              # Bob should not see Alice's todo
              req = urllib.request.Request(
                  self.base + '/todos',
                  headers={'Authorization': 'Bearer ' + token_b}
              )
              resp = urllib.request.urlopen(req)
              todos = json.loads(resp.read())
              self.assertEqual(len(todos), 0)

      if __name__ == '__main__':
          unittest.main()
      PY

prompt: |
  Build a fullstack todo app with JWT-like authentication in `fixtures/auth_app/`.

  The project has skeleton files:
  - `fixtures/auth_app/backend/app.py` — Python HTTP API
  - `fixtures/auth_app/frontend/index.html` — HTML page
  - `fixtures/auth_app/frontend/app.js` — Frontend JavaScript
  - `fixtures/auth_app/backend/test_app.py` — Backend tests

  Your task:
  1. Complete the backend API (`app.py`):
     - `POST /register` — Create user with hashed password, return {username}
     - `POST /login` — Verify credentials, return {token} (JWT-like: base64-encoded username:timestamp:signature)
     - `POST /todos` — Create todo (requires `Authorization: Bearer <token>` header)
     - `GET /todos` — List user's todos (requires auth)
     - `DELETE /todos/<id>` — Delete todo (requires auth)
     - Token format suggestion: `base64(username:timestamp:hmac)` where hmac = sha256(username + timestamp + SECRET_KEY)
     - User isolation: each user only sees their own todos
     - Return 401 for unauthenticated requests to protected endpoints
  
  2. Complete the frontend (`app.js`):
     - `register()` — POST /register, show error or switch to login
     - `login()` — POST /login, save token to localStorage, show app
     - `logout()` — Clear token, show auth section
     - `addTodo(e)` — POST /todos with auth header, then reload list
     - `loadTodos()` — GET /todos with auth, render in #todos div
     - `deleteTodo(id)` — DELETE /todos/id with auth, reload list
     - On startup: if token in localStorage, show app section
  
  3. Verify:
     - Run `python3 -m unittest fixtures/auth_app/backend/test_app.py`
     - All 5 tests should pass

  Start by reading the existing files, then implement backend first, then frontend.
  Use file_read to inspect, file_edit to change, bash to run tests.

allowed_tools:
  - grep
  - file_read
  - file_edit
  - file_write
  - bash
  - todo_write

forbidden_tools:
  - git_push
  - memory_clear

expected_behavior:
  - agent should read test file first
  - implement backend with proper auth and user isolation
  - implement frontend with localStorage persistence
  - run tests to verify

acceptance:
  required_commands:
    - "python3 -m unittest fixtures/auth_app/backend/test_app.py"
    - "python3 -m py_compile fixtures/auth_app/backend/app.py"
  forbidden_commands: []
  diff_constraints:
    max_files_changed: 4
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Does register create user with hashed password?
    - Does login return a valid token?
    - Does GET /todos require auth and return 401 without it?
    - Does POST /todos create todos for the authenticated user?
    - Are users isolated (can't see each other's todos)?
    - Does frontend persist token in localStorage?
    - Do all 5 backend tests pass?

scoring:
  success: 0.30
  test_pass: 0.25
  backend_auth: 0.15
  user_isolation: 0.10
  frontend_completeness: 0.10
  diff_discipline: 0.05
  closeout_quality: 0.05
