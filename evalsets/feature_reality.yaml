name: feature_reality
description: Guards that advertised CLI/tools are backed by real runtime availability.
scenarios:
  - id: core-tools-available-without-optional-managers
    prompt: "检查当前项目文件"
    expect:
      available_tools:
        - bash
        - file_read
        - glob
        - grep

  - id: optional-manager-tools-hidden-when-unwired
    prompt: "列出当前 session 可用工具"
    expect:
      unavailable_tools:
        - agent
        - send_message
        - mcp
        - mcp_tool
        - list_mcp_resources
        - read_mcp_resource
        - lsp
        - worktree

  - id: command-readiness-markers
    prompt: "打开命令面板"
    expect:
      available_commands:
        - /skills
        - /tools
        - /uptime
      placeholder_commands:
        - /desktop
        - /reset

  - id: skill-runtime-loads-direct-invocation-skills
    prompt: "使用 /karpathy 检查代码"
    expect:
      skills:
        - karpathy-guidelines
        - review
        - verify
      available_commands:
        - /skills
        - /karpathy

  - id: agent-profiles-are-discoverable
    prompt: "派一个 verifier 子 agent 做验证"
    expect:
      agent_profiles:
        - explorer
        - verifier
        - implementer
      unavailable_tools:
        - agent

  - id: mcp-command-surface-is-realistic-without-manager
    prompt: "列出 MCP prompts 和 resources"
    expect:
      available_commands:
        - /mcp
      unavailable_tools:
        - mcp
        - mcp_tool
        - read_mcp_resource

  - id: dashboard-commands-remain-production-ready
    prompt: "查看当前 dashboard 状态"
    expect:
      available_commands:
        - /status
        - /resource
        - /eval
