id: fullstack-mini-blog
title: Build a mini fullstack blog app with Python backend and vanilla JS frontend
type: feature
eval_intent: seeded_code_change
complexity: medium
risk: medium
tier: tier-3-multi-file

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      mkdir -p fixtures/fullstack_blog/backend fixtures/fullstack_blog/frontend
      
      # Create backend skeleton
      cat > fixtures/fullstack_blog/backend/blog_api.py <<'PY'
