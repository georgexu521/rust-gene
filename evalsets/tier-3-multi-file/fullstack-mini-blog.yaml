      # Create backend test
      cat > fixtures/fullstack_blog/backend/test_blog.py <<'PY'
      import unittest
      import json
      import threading
      import urllib.request
      import time
      import sys
      import os
      sys.path.insert(0, os.path.join(os.path.dirname(__file__)))
      import blog_api

      class BlogApiTest(unittest.TestCase):
          @classmethod
          def setUpClass(cls):
              cls.server = blog_api.HTTPServer(('127.0.0.1', 8081), blog_api.BlogHandler)
              cls.base = 'http://127.0.0.1:8081'
              cls.thread = threading.Thread(target=cls.server.serve_forever, daemon=True)
              cls.thread.start()
              time.sleep(0.5)

          @classmethod
          def tearDownClass(cls):
              cls.server.shutdown()
          
          def setUp(self):
              blog_api.posts.clear()

          def test_create_and_list_posts(self):
              req = urllib.request.Request(
                  self.base + '/posts',
                  data=json.dumps({"title": "Hello", "content": "World"}).encode(),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              resp = urllib.request.urlopen(req)
              self.assertEqual(resp.status, 201)
              data = json.loads(resp.read())
              self.assertIn('id', data)
              self.assertEqual(data['title'], 'Hello')
              
              # List should include the post
              resp = urllib.request.urlopen(self.base + '/posts')
              self.assertEqual(resp.status, 200)
              posts = json.loads(resp.read())
              self.assertEqual(len(posts), 1)
              self.assertEqual(posts[0]['title'], 'Hello')

          def test_delete_post(self):
              # Create a post
              req = urllib.request.Request(
                  self.base + '/posts',
                  data=json.dumps({"title": "To Delete", "content": "Bye"}).encode(),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              resp = urllib.request.urlopen(req)
              post = json.loads(resp.read())
              
              # Delete it
              req = urllib.request.Request(self.base + '/posts/' + post['id'], method='DELETE')
              resp = urllib.request.urlopen(req)
              self.assertEqual(resp.status, 200)
              
              # Should be empty now
              resp = urllib.request.urlopen(self.base + '/posts')
              posts = json.loads(resp.read())
              self.assertEqual(len(posts), 0)

      if __name__ == '__main__':
          unittest.main()
      PY

prompt: |
  Build a mini fullstack blog application in `fixtures/fullstack_blog/`.

  The project has skeleton files:
  - `fixtures/fullstack_blog/backend/blog_api.py` — Python HTTP API
  - `fixtures/fullstack_blog/frontend/index.html` — HTML page
  - `fixtures/fullstack_blog/frontend/app.js` — Frontend JavaScript
  - `fixtures/fullstack_blog/backend/test_blog.py` — Tests

  Your task:
  1. Complete the backend API (`blog_api.py`):
     - `GET /posts` — Return all posts sorted by date descending
     - `POST /posts` — Create a new post with {title, content}, auto-generate id and date
     - `DELETE /posts/<id>` — Delete a post by id
     - Add CORS headers (`Access-Control-Allow-Origin: *`)
  
  2. Complete the frontend (`app.js`):
     - `loadPosts()` — Fetch posts from API and render them in #posts div
     - `createPost(title, content)` — POST new post to API
     - `deletePost(id)` — DELETE post by id, then reload posts
     - Each post should show: title, content, date, and a delete button
  
  3. Verify:
     - Run `python3 -m unittest fixtures/fullstack_blog/backend/test_blog.py`
     - All tests should pass

  Start by reading the existing files, then implement the TODO sections.
  Use file_read to inspect files, file_edit to make changes, and bash to run tests.

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - git_push
  - memory_clear

expected_behavior:
  - agent should read existing files first
  - implement backend API with proper JSON handling
  - implement frontend with fetch API calls
  - run tests to verify

acceptance:
  required_commands:
    - "python3 -m unittest fixtures/fullstack_blog/backend/test_blog.py"
    - "python3 -m py_compile fixtures/fullstack_blog/backend/blog_api.py"
  diff_constraints:
    max_files_changed: 4
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Does GET /posts return posts sorted by date?
    - Does POST /posts create posts with auto-generated id?
    - Does DELETE /posts/<id> remove the post?
    - Do the frontend functions call the API correctly?
    - Do all tests pass?

scoring:
  success: 0.35
  test_pass: 0.30
  backend_completeness: 0.15
  frontend_completeness: 0.10
  diff_discipline: 0.05
  closeout_quality: 0.05
