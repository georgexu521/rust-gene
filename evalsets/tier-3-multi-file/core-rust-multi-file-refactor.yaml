id: core-rust-multi-file-refactor
title: multi-file Rust refactor with focused tests
type: refactor
eval_intent: seeded_code_change
capability_level: 4
complexity: medium
risk: medium
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "mkdir -p fixtures/core_quality/rust_refactor/src\ncat > fixtures/core_quality/rust_refactor/Cargo.toml\
    \ <<'TOML'\n[package]\nname = \"core-quality-rust-refactor\"\nversion = \"0.1.0\"\
    \nedition = \"2021\"\nTOML\ncat > fixtures/core_quality/rust_refactor/src/lib.rs\
    \ <<'RS'\npub mod report;\npub mod stats;\n\npub fn format_total(label: &str,\
    \ values: &[u32]) -> String {\n    report::format_report(label, values)\n}\n\n\
    #[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn formats_total_with_average()\
    \ {\n        assert_eq!(format_total(\"latency\", &[3, 5, 7]), \"latency total=15\
    \ avg=5\");\n    }\n\n    #[test]\n    fn handles_empty_values() {\n        assert_eq!(format_total(\"\
    latency\", &[]), \"latency total=0 avg=0\");\n    }\n}\nRS\ncat > fixtures/core_quality/rust_refactor/src/report.rs\
    \ <<'RS'\npub fn format_report(label: &str, values: &[u32]) -> String {\n    let\
    \ total: u32 = values.iter().sum();\n    format!(\"{label} total={total}\")\n\
    }\nRS\ncat > fixtures/core_quality/rust_refactor/src/stats.rs <<'RS'\npub fn average(_values:\
    \ &[u32]) -> u32 {\n    0\n}\nRS\n"
prompt: '修复 `fixtures/core_quality/rust_refactor` 的 Rust 报告格式回归。


  当前测试要求报告同时包含 total 和 avg，但 `report.rs` 只输出 total，

  且 `stats.rs` 里的 average helper 还没有实现真实平均值。


  要求：

  - 先检查 `lib.rs`、`report.rs` 和 `stats.rs`，理解 public API 和测试期望。

  - 做一个小的多文件 Rust 改动：保留 `format_total` API，让 `report.rs` 使用 `stats::average`。

  - 空数组平均值应为 0。

  - 运行对应 cargo test。

  '
allowed_tools:
- grep
- file_read
- file_edit
- file_patch
- bash
forbidden_tools:
- file_write
- git_push
expected_behavior:
- The agent reads both Rust files before editing.
- The change is a focused Rust refactor, not a broad rewrite.
- The fixture tests pass after the edit.
acceptance:
  required_commands:
  - cargo test -q --manifest-path fixtures/core_quality/rust_refactor/Cargo.toml
  - rg 'avg=' fixtures/core_quality/rust_refactor/src/report.rs
  - rg 'stats::average' fixtures/core_quality/rust_refactor/src/report.rs
  - rg 'pub fn average' fixtures/core_quality/rust_refactor/src/stats.rs
  - rg 'format_total' fixtures/core_quality/rust_refactor/src/lib.rs
  diff_constraints:
    max_files_changed: 4
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - Did the agent inspect the API and implementation before changing code?
  - Did the edit remain narrow while still touching the right Rust boundaries?
  - Did the agent validate with the fixture cargo test?
scoring:
  success: 0.3
  test_pass: 0.25
  rust_refactor_quality: 0.2
  file_state: 0.15
  diff_discipline: 0.1
tier: tier-3-multi-file
