id: live-eval-dashboard-summary
title: live eval reports should summarize pass rates and failure modes
type: feature
eval_intent: seeded_code_change
complexity: medium
risk: medium
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "python3 - <<'PY'\nfrom pathlib import Path\nfrom textwrap import dedent\n\npath\
    \ = Path(\"scripts/run_live_eval.sh\")\ntext = path.read_text()\nstart = text.find(\"\
    \\nsummary_task() {\\n\")\nend = text.find(\"\\nrun_one() {\", start)\nif start\
    \ < 0 or end < 0:\n    raise SystemExit(\"expected summary_task function was not\
    \ found\")\nstub = dedent('''\nsummary_task() {\n  local run_report_dir=\"$REPORT_DIR/live-$RUN_ID\"\
    \n  local summary=\"$run_report_dir/summary.md\"\n  mkdir -p \"$run_report_dir\"\
    \n  echo \"summary mode is not implemented yet\" >&2\n  echo \"# Live Eval Summary:\
    \ $RUN_ID\" >\"$summary\"\n  echo \"\" >>\"$summary\"\n  echo \"- status: not_implemented\"\
    \ >>\"$summary\"\n  return 2\n}\n''')\ntext = text[:start] + \"\\n\" + stub +\
    \ text[end:]\nif \"--mode summary\" not in text or \"summary_task\" not in text:\n\
    \    raise SystemExit(\"summary mode entrypoint unexpectedly missing\")\npath.write_text(text)\n\
    PY\n"
  setup:
  - bash -n scripts/run_live_eval.sh
prompt: '为 live eval 增加汇总报告能力，方便长期对标 Claude Code / Codex。


  当前 seeded worktree 已保留 `scripts/run_live_eval.sh --mode summary` 入口，

  但 `summary_task()` 被替换成了未实现 stub。请优先修改

  `scripts/run_live_eval.sh` 里的 `summary_task()`，不要停在检查脚本状态。


  要求：

  - 对一个 run-id 下的任务生成 summary.md。

  - 汇总每个任务的 plan lint、HTTP/API 状态、required command 状态、主要失败模式。

  - 报告要区分 plan-only 通过和真实 code-change 通过，不能混淆。

  - 增加脚本帮助文档或测试，保证 summary 生成可重复。

  '
allowed_tools:
- grep
- file_read
- file_edit
- bash
forbidden_tools:
- git_push
expected_behavior:
- '`scripts/run_live_eval.sh` 或配套脚本能生成 run summary。'
- summary 明确标注 plan_quality、tool_boundary、verification_status。
- 报告可作为 memory/skill/evolution 的训练信号入口。
acceptance:
  required_commands:
  - bash -n scripts/run_live_eval.sh
  - scripts/run_live_eval.sh --list
  - scripts/run_live_eval.sh --mode summary --run-id live-summary-smoke
  - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - 报告是否能一眼看出失败模式？
  - 是否避免把 plan-only 当成真实完成？
scoring:
  success: 0.35
  test_pass: 0.15
  report_usefulness: 0.3
  benchmark_alignment: 0.1
  diff_discipline: 0.1
tier: tier-3-multi-file
