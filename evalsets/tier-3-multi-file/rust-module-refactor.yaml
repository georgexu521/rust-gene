id: rust-module-refactor
title: Add a config validation module to a Rust CLI project
type: feature
eval_intent: seeded_code_change
complexity: medium
risk: low
tier: tier-3-multi-file

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      mkdir -p fixtures/rust_config_app/src fixtures/rust_config_app/tests
      cat > fixtures/rust_config_app/Cargo.toml <<'TOML'
      [package]
      name = "config_app"
      version = "0.1.0"
      edition = "2021"

      [lib]
      name = "config_app"
      path = "src/main.rs"

      [[bin]]
      name = "config_app"
      path = "src/main.rs"

      [dependencies]
      serde = { version = "1.0", features = ["derive"] }
      serde_json = "1.0"
      TOML

      cat > fixtures/rust_config_app/src/main.rs <<'RUST'
      pub mod config_validator;

      use std::env;
      use std::fs;

      fn main() {
          let config_path = env::args().nth(1).expect("Usage: config_app <config.json>");
          let content = fs::read_to_string(&config_path).expect("Failed to read config");

          // TODO: validate config before printing
          println!("Config loaded: {}", content);

          let config: serde_json::Value = serde_json::from_str(&content).expect("Invalid JSON");
          println!("Name: {}", config["name"].as_str().unwrap_or("unknown"));
      }
      RUST

      # Create test config files
      cat > fixtures/rust_config_app/valid.json <<'JSON'
      {
          "name": "myapp",
          "version": "1.0.0",
          "port": 8080,
          "debug": false
      }
      JSON

      cat > fixtures/rust_config_app/invalid.json <<'JSON'
      {
          "name": "",
          "version": "1.0",
          "port": -1,
          "debug": "yes"
      }
      JSON

      cat > fixtures/rust_config_app/src/config_validator.rs <<'RUST'
      use serde::Deserialize;

      // TODO: implement config validation
      // - name must be non-empty string
      // - version must be non-empty string
      // - port must be a positive integer (1-65535)
      // - debug must be a boolean

      #[derive(Debug, Deserialize)]
      pub struct Config {
          pub name: String,
          pub version: String,
          pub port: u16,
          pub debug: bool,
      }

      pub fn validate_config(content: &str) -> Result<Config, String> {
          // TODO: parse JSON and validate fields
          Err("not implemented".to_string())
      }
      RUST

      cat > fixtures/rust_config_app/tests/integration.rs <<'RUST'
      use config_app::config_validator::{validate_config, Config};

      #[test]
      fn test_valid_config() {
          let content = r#"{"name":"myapp","version":"1.0.0","port":8080,"debug":false}"#;
          let config = validate_config(content).expect("should validate");
          assert_eq!(config.name, "myapp");
          assert_eq!(config.version, "1.0.0");
          assert_eq!(config.port, 8080);
          assert_eq!(config.debug, false);
      }

      #[test]
      fn test_empty_name() {
          let content = r#"{"name":"","version":"1.0.0","port":8080,"debug":false}"#;
          assert!(validate_config(content).is_err());
      }

      #[test]
      fn test_empty_version() {
          let content = r#"{"name":"myapp","version":"","port":8080,"debug":false}"#;
          assert!(validate_config(content).is_err());
      }

      #[test]
      fn test_invalid_port_zero() {
          let content = r#"{"name":"myapp","version":"1.0.0","port":0,"debug":false}"#;
          assert!(validate_config(content).is_err());
      }

      #[test]
      fn test_invalid_port_too_large() {
          let content = r#"{"name":"myapp","version":"1.0.0","port":70000,"debug":false}"#;
          assert!(validate_config(content).is_err());
      }

      #[test]
      fn test_invalid_json() {
          let content = r#"{"name":"myapp""#;
          assert!(validate_config(content).is_err());
      }

      #[test]
      fn test_missing_field() {
          let content = r#"{"name":"myapp","version":"1.0.0","port":8080}"#;
          assert!(validate_config(content).is_err());
      }

      #[test]
      fn test_wrong_debug_type() {
          let content = r#"{"name":"myapp","version":"1.0.0","port":8080,"debug":"true"}"#;
          assert!(validate_config(content).is_err());
      }
      RUST

prompt: |
  Add a config validation module to a Rust CLI project in `fixtures/rust_config_app/`.

  The project structure:
  - `fixtures/rust_config_app/Cargo.toml` — already has serde and serde_json
  - `fixtures/rust_config_app/src/main.rs` — CLI entry point
  - `fixtures/rust_config_app/src/config_validator.rs` — skeleton module to complete
  - `fixtures/rust_config_app/tests/integration.rs` — integration tests

  Your task:
  1. Complete `config_validator.rs`:
     - Implement `validate_config()` to parse JSON and validate:
       - `name`: non-empty string
       - `version`: non-empty string
       - `port`: positive integer between 1-65535
       - `debug`: must be a boolean
     - Return `Ok(Config)` on success, `Err(String)` on failure

  2. Update `main.rs`:
     - Import and use the `config_validator` module
     - Replace direct JSON parsing with `validate_config()`
     - Print error message and exit(1) on invalid config
     - Print validated fields on success

  3. Make sure `config_validator` is a public module (add `pub mod config_validator`)

  4. Verify:
     - Run `cargo test` in `fixtures/rust_config_app/`
     - All 8 tests should pass
     - Run `cargo run -- fixtures/rust_config_app/valid.json` should succeed
     - Run `cargo run -- fixtures/rust_config_app/invalid.json` should fail

  Use file_read to inspect files, file_edit to make changes, and bash to run tests.

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - git_push
  - memory_clear

expected_behavior:
  - agent should read existing files first
  - implement config validation with proper error handling
  - integrate module into main.rs
  - run tests to verify

acceptance:
  required_commands:
    - "(cd fixtures/rust_config_app && cargo test -q)"
    - "(cd fixtures/rust_config_app && cargo run -q -- valid.json)"
    - "(cd fixtures/rust_config_app && ! cargo run -q -- invalid.json)"
  forbidden_commands: []
  diff_constraints:
    max_files_changed: 3
    forbidden_paths:
      - target/
      - .git/
      - Cargo.lock
  human_review:
    - Does validate_config reject empty name?
    - Does validate_config reject port 0 and port > 65535?
    - Does validate_config reject non-boolean debug?
    - Does main.rs use config_validator and exit(1) on error?
    - Do all 8 integration tests pass?
    - Does cargo run with valid.json succeed and invalid.json fail?

scoring:
  success: 0.35
  test_pass: 0.30
  module_completeness: 0.15
  integration_quality: 0.10
  diff_discipline: 0.05
  closeout_quality: 0.05
