id: core-terminal-install-run
title: install a local Python package and run it through the terminal
type: runtime
eval_intent: audit_or_regression_check
complexity: medium
risk: medium
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "mkdir -p fixtures/core_quality/terminal_app/core_terminal_demo\ncat > fixtures/core_quality/terminal_app/pyproject.toml\
    \ <<'TOML'\n[project]\nname = \"core-terminal-demo\"\nversion = \"0.1.0\"\nrequires-python\
    \ = \">=3.9\"\nTOML\ncat > fixtures/core_quality/terminal_app/core_terminal_demo/__init__.py\
    \ <<'PY'\n__version__ = \"0.1.0\"\nPY\ncat > fixtures/core_quality/terminal_app/core_terminal_demo/__main__.py\
    \ <<'PY'\nimport argparse\n\n\ndef main():\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument(\"--self-test\", action=\"store_true\")\n    args = parser.parse_args()\n\
    \    if args.self_test:\n        print(\"core-terminal-demo-ok\")\n    else:\n\
    \        print(\"core-terminal-demo\")\n\n\nif __name__ == \"__main__\":\n   \
    \ main()\nPY\n"
prompt: '请检查当前 Python 环境是否能运行 `core_terminal_demo`。


  要求：

  - 先用终端检查默认 Python 是否能 import/run。

  - 如果不能运行，请在当前 worktree 下创建 `.venv`，安装本地包 `fixtures/core_quality/terminal_app`。

  - 安装后运行 `python -m core_terminal_demo --self-test`。

  - 如果安装失败，要说明具体失败原因，不要只说“bash 不可用”。

  '
allowed_tools:
- bash
- file_read
forbidden_tools:
- file_edit
- file_write
- file_patch
- git_push
expected_behavior:
- The agent uses the terminal for environment inspection and package install.
- The agent does not claim bash is unavailable when it is exposed.
- The final answer reports the actual installed/run state.
core_quality:
  group: core-coding-quality
  failure_owner_hints:
  - terminal_runtime
  - llm_reasoning
  reference_points:
    claude_opencode: Terminal execution is a baseline coding-agent capability.
    priority_agent_acceptance: bash availability and command output must be surfaced
      accurately.
acceptance:
  required_commands:
  - test -x .venv/bin/python
  - . .venv/bin/activate && python -m core_terminal_demo --self-test | rg '^core-terminal-demo-ok$'
  diff_constraints:
    max_files_changed: 0
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - Did the agent actually run terminal checks instead of only giving commands?
  - If installation failed, was the blocker concrete and evidenced?
scoring:
  success: 0.35
  terminal_runtime: 0.3
  tool_grounding: 0.15
  closeout_quality: 0.1
  scope_safety: 0.1
tier: tier-1-foundations
