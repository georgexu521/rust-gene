id: core-inspection-grounding
title: inspect filesystem facts without hallucinating metadata
type: audit
eval_intent: audit_or_regression_check
capability_level: 1
complexity: low
risk: low
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - 'mkdir -p fixtures/core_quality/inspection_target/gex/notes

    printf ''alpha\n'' > fixtures/core_quality/inspection_target/gex/a.txt

    printf ''beta\n'' > fixtures/core_quality/inspection_target/gex/b.log

    printf ''hidden\n'' > fixtures/core_quality/inspection_target/gex/.hidden

    '
prompt: '请查看 `fixtures/core_quality/inspection_target/gex` 目录，并回答里面有什么。


  要求：

  - 必须基于实际工具输出回答，不要编造大小、创建时间或项目数量。

  - 区分普通条目、隐藏文件和子目录。

  - 如果某个事实没有被工具输出证明，就明确说没有检查到，而不是猜。

  '
allowed_tools:
- bash
- file_read
forbidden_tools:
- file_edit
- file_write
- file_patch
- git_push
expected_behavior:
- The answer lists facts that are directly grounded in directory output.
- The answer does not invent file size, creation time, or content counts.
- No code or fixture files are changed.
runtime_spine_assertions:
  required_phases:
  - context
  - decision
  - tool_execution
  - state_update
  - closeout
  required_events:
  - action_decision
  - stop_check
  verification_proof: true
core_quality:
  group: core-coding-quality
  failure_owner_hints:
  - llm_reasoning
  - tool_contract
  reference_points:
    claude_opencode: Inspect before answering and avoid unsupported filesystem metadata.
    priority_agent_acceptance: Tool output should ground the answer; no diff is expected.
acceptance:
  required_commands:
  - test -d fixtures/core_quality/inspection_target/gex
  - test -f fixtures/core_quality/inspection_target/gex/a.txt
  - test -f fixtures/core_quality/inspection_target/gex/.hidden
  - test -d fixtures/core_quality/inspection_target/gex/notes
  diff_constraints:
    max_files_changed: 0
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - Did the agent avoid invented size, creation time, and item counts?
  - Did the answer distinguish hidden files from visible files?
scoring:
  success: 0.35
  hallucination_guard: 0.35
  tool_grounding: 0.2
  closeout_quality: 0.1
tier: tier-1-foundations
