name: coding_replay_matrix
description: Stable deterministic replay matrix for daily coding-agent behavior.
scenarios:
  - id: edit-then-test-pass
    prompt: "修改代码并运行测试确认通过"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited src/lib.rs"
        - tool: bash
          output: "cargo test passed"
      verification_passed: true
      changed_files: ["src/lib.rs"]
      acceptance_review_accepted: true
    expect:
      tool_sequence: ["file_edit", "bash"]
      verification_passed: true
      reflection_status: Passed
      trace_events: ["tool.start", "tool.done", "verify.done", "reflection.pass", "acceptance.review"]

  - id: file-edit-rewind-checkpoint
    prompt: "修改文件后用 checkpoint-backed rewind 回滚这次改动"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited src/lib.rs with checkpoint cp_eval_1"
      file_changes:
        - id: fc_eval_1
          checkpoint_id: cp_eval_1
          path: src/lib.rs
          tool_name: file_edit
          existed_before: true
          before_hash: before123
          after_hash: after456
          diff: "-old\n+new"
          bytes_written: 42
      rewind:
        target: fc_eval_1
        checkpoint_id: cp_eval_1
        command: "/rewind"
        restored_files: ["src/lib.rs"]
    expect:
      tool_sequence: ["file_edit"]
      file_checkpoint_count: 1
      file_change_id: fc_eval_1
      file_checkpoint_id: cp_eval_1
      file_checkpoint_path: src/lib.rs
      rewind_target: fc_eval_1
      rewind_command: "/rewind"
      rewind_checkpoint_id: cp_eval_1
      rewind_restored_files: 1
      available_commands: ["/rewind", "/checkpoints"]
      trace_events: ["tool.start", "tool.done"]

  - id: edit-then-test-fail
    prompt: "修复失败测试"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited src/main.rs"
        - tool: bash
          success: false
          output: "cargo test failed"
      verification_passed: false
      changed_files: ["src/main.rs"]
      failed_commands: ["cargo test"]
    expect:
      tool_sequence: ["file_edit", "bash"]
      failed_tool: bash
      verification_passed: false
      reflection_status: Blocked
      repair_required: true

  - id: cargo-check-env-pass
    prompt: "运行带环境变量的 cargo check 验证"
    replay:
      tool_calls:
        - tool: bash
          output: "env PRIORITY_AGENT_WORKFLOW_ENABLED=1 cargo check passed"
      verification_passed: true
    expect:
      tool_sequence: ["bash"]
      verification_passed: true
      repair_required: false

  - id: bash-background-task-handle
    prompt: "启动后台构建任务，读取输出，不要阻塞主会话"
    replay:
      tool_calls:
        - tool: bash
          output: "Started background shell command. Handle: shell-bg-eval-1"
        - tool: bash_output
          output: "server ready"
      terminal_tasks:
        - id: shell-bg-eval-1
          source_tool: bash
          status: running
          command: "npm run dev"
          handle: shell-bg-eval-1
          read_tool: bash_output
          cancel_tool: bash_cancel
          cancel_handle: shell-bg-eval-1
          backgrounded: true
    expect:
      tool_sequence: ["bash", "bash_output"]
      terminal_task_count: 1
      terminal_task_id: shell-bg-eval-1
      terminal_task_status: running
      terminal_task_read_tool: bash_output
      terminal_task_cancel_tool: bash_cancel
      backgrounded_tool: bash
      trace_events: ["tool.start", "tool.done"]

  - id: npm-test-fail-repair-needed
    prompt: "前端改动后 npm test 报错，继续修"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited src/App.tsx"
        - tool: bash
          success: false
          output: "npm test failed"
      verification_passed: false
      changed_files: ["src/App.tsx"]
      failed_commands: ["npm test"]
    expect:
      failed_tool: bash
      verification_passed: false
      repair_required: true

  - id: grep-no-result-recovery
    prompt: "搜索符号没有结果后换查询策略"
    replay:
      tool_calls:
        - tool: grep
          success: false
          output: "No matches found. Try broader terms."
        - tool: project_list
          output: "src/engine/conversation_loop/mod.rs"
    expect:
      tool_sequence: ["grep", "project_list"]
      failed_tool: grep
      trace_events: ["tool.done"]

  - id: stale-file-edit-refusal
    prompt: "文件被改过后不要用旧读数继续编辑"
    replay:
      tool_calls:
        - tool: file_edit
          success: false
          output: "stale read refused"
    expect:
      tool_sequence: ["file_edit"]
      failed_tool: file_edit
      repair_required: false

  - id: action-checkpoint-synthesis
    prompt: "反复读取后进入补丁合成"
    replay:
      tool_calls:
        - tool: file_read
          output: "current source"
        - tool: grep
          output: "target symbol"
        - tool: file_edit
          output: "patch synthesized"
      verification_passed: true
      changed_files: ["src/engine/mod.rs"]
    expect:
      tool_sequence: ["file_read", "grep", "file_edit"]
      verification_passed: true

  - id: permission-denied-command
    prompt: "危险 bash 命令被权限拦截"
    replay:
      tool_calls:
        - tool: bash
          success: false
          output: "Permission denied: dangerous command"
    expect:
      failed_tool: bash
      tool_sequence: ["bash"]

  - id: permission-denial-retry-recovery
    prompt: "拒绝危险删除命令后解释权限恢复，并改用只读检查继续"
    replay:
      tool_calls:
        - tool: bash
          success: false
          output: "Permission denied: 'bash' requires user confirmation."
          permission:
            prompt: "Allow bash rm -rf fixtures/tmp?"
            approved: false
            decision: reject_once
        - tool: file_read
          output: "safe readonly manifest"
        - tool: grep
          output: "cleanup skipped by user request"
      recovery_plans:
        - source: tool_execution
          category: permission_denied
          action: "explain denial and retry with safe readonly path"
          retryable: false
          safe_retry: false
          suggested_command: "/permissions explain"
          status: Planned
    expect:
      failed_tool: bash
      tool_sequence: ["bash", "file_read", "grep"]
      permission_approved: false
      permission_decision: reject_once
      recovery_category: permission_denied
      recovery_suggested_command: "/permissions explain"
      recovery_safe_retry: false
      repair_required: false
      trace_events: ["permission.request", "permission.resolve", "recovery.plan", "tool.done"]

  - id: hook-blocks-risky-tool
    prompt: "pre-tool hook 阻止风险操作"
    replay:
      tool_calls:
        - tool: bash
          success: false
          output: "blocked by pre-tool hook"
    expect:
      failed_tool: bash
      trace_events: ["tool.start", "tool.done"]

  - id: subagent-verifier-report
    prompt: "派 verifier 子 agent 审查补丁"
    replay:
      tool_calls:
        - tool: agent
          output: "verifier completed with findings"
    expect:
      tool_sequence: ["agent"]
      trace_events: ["tool.done"]

  - id: subagent-timeout-visible
    prompt: "子 agent 超时后返回结构化失败"
    replay:
      tool_calls:
        - tool: agent
          success: false
          output: "Timeout waiting for agent"
    expect:
      failed_tool: agent
      tool_sequence: ["agent"]

  - id: subagent-worktree-worker-review-merge
    prompt: "派子 agent 在隔离 worktree 里修改路由，然后 review、merge、cleanup"
    replay:
      subagents:
        - agent_id: agent_eval_1
          profile: implementer
          role: specialist
          description: "Implement scoped route repair"
          timeout_secs: 300
          allowed_tools: 4
          status: completed
          duration_ms: 1200
          output_chars: 512
          tools_used: 3
          context_mode: isolated_worktree_fork
          worktree_path: /tmp/priority-agent/.claude/worktrees/agent-route-fix-eval
          worktree_branch: codex/agent-eval1
          recursive_fork_guard: true
          placeholder_complete: true
          fork_message_count: 4
          parent_tool_call_ids: ["parent_call_1"]
          cleanup_hooks: ["worktree_cleanup"]
      agent_worktree_actions:
        - action: agent_review
          agent_id: agent_eval_1
          command: "/agents worktree review agent_eval_1"
          status: success
          path: /tmp/priority-agent/.claude/worktrees/agent-route-fix-eval
          branch: codex/agent-eval1
          commits_ahead: 1
        - action: agent_merge
          agent_id: agent_eval_1
          command: "/agents worktree merge agent_eval_1 --yes"
          status: success
          path: /tmp/priority-agent/.claude/worktrees/agent-route-fix-eval
          branch: codex/agent-eval1
          commits_ahead: 1
          merge_kind: branch
        - action: agent_cleanup
          agent_id: agent_eval_1
          command: "/agents worktree cleanup agent_eval_1 --yes --delete-branch"
          status: success
          path: /tmp/priority-agent/.claude/worktrees/agent-route-fix-eval
          branch: codex/agent-eval1
          cleanup: true
          delete_branch: true
      tool_calls:
        - tool: agent
          output: "agent_eval_1 completed in isolated worktree"
        - tool: worktree
          output: "Agent worktree review: agent_eval_1"
        - tool: worktree
          output: "Merged branch: codex/agent-eval1"
        - tool: worktree
          output: "Removed agent worktree"
    expect:
      subagent_count: 1
      subagent_agent_id: agent_eval_1
      subagent_profile: implementer
      subagent_role: specialist
      subagent_status: completed
      subagent_context_mode: isolated_worktree_fork
      subagent_allowed_tools: 4
      isolated_worktree_path: /tmp/priority-agent/.claude/worktrees/agent-route-fix-eval
      isolated_worktree_branch: codex/agent-eval1
      recursive_fork_guard: true
      fork_placeholder_complete: true
      fork_message_count: 4
      agent_worktree_action_count: 3
      agent_worktree_review_command: "/agents worktree review agent_eval_1"
      agent_worktree_merge_command: "/agents worktree merge agent_eval_1 --yes"
      agent_worktree_cleanup_command: "/agents worktree cleanup agent_eval_1 --yes --delete-branch"
      agent_worktree_review_status: success
      agent_worktree_merge_status: success
      agent_worktree_cleanup_status: success
      agent_worktree_merge_kind: branch
      agent_worktree_cleanup_deleted_branch: true
      tool_sequence: ["agent", "worktree", "worktree", "worktree"]
      trace_events: ["subagent.start", "subagent.done", "tool.done"]

  - id: mcp-resource-read
    prompt: "读取 MCP resource 并纳入上下文"
    replay:
      tool_calls:
        - tool: read_mcp_resource
          output: "resource content"
    expect:
      tool_sequence: ["read_mcp_resource"]

  - id: memory-retrieval-routing
    prompt: "根据之前记忆继续规划这个项目"
    expect:
      retrieval: memory
      recommended_tools: ["memory_load"]

  - id: web-research-route
    prompt: "搜索最新 Rust CLI 设计资料"
    expect:
      intent: research
      retrieval: web
      recommended_tools: ["web_search", "web_fetch"]

  - id: direct-answer-no-tools
    prompt: "你好，简单介绍一下当前能力"
    expect:
      intent: direct_answer
      forbidden_tools: ["bash", "file_edit"]

  - id: project-search-before-edit
    prompt: "在项目里找到状态栏代码再修改"
    replay:
      tool_calls:
        - tool: project_list
          output: "src/tui/status.rs"
        - tool: file_read
          output: "status code"
        - tool: file_edit
          output: "edited status"
    expect:
      tool_sequence: ["project_list", "file_read", "file_edit"]

  - id: validation-closeout-pass
    prompt: "完成修改后最终回复必须包含验证证据"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited"
        - tool: bash
          output: "cargo check passed"
      verification_passed: true
      changed_files: ["src/lib.rs"]
      acceptance_review_accepted: true
    expect:
      verification_passed: true
      trace_events: ["verify.done", "acceptance.review"]

  - id: validation-closeout-fail
    prompt: "验证失败时不要声称完成"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited"
        - tool: bash
          success: false
          output: "cargo check failed"
      verification_passed: false
      changed_files: ["src/lib.rs"]
      failed_commands: ["cargo check"]
      acceptance_review_accepted: false
    expect:
      failed_tool: bash
      verification_passed: false
      repair_required: true
      trace_events: ["verify.done", "acceptance.review"]

  - id: context-compaction-safe
    prompt: "长会话压缩后继续执行当前修复"
    replay:
      workflow_judgment: true
      context_compactions:
        - before_tokens: 122000
          after_tokens: 64000
          strategy: semantic_boundary
          boundary_id: cb-eval-1
          sequence: 7
          messages_before: 48
          messages_after: 19
          preserved_tail_count: 6
          provenance: ["summary:project_state", "tail:latest_tool_results"]
      runtime_diet:
        prompt_tokens: 64000
        tool_schema_tokens: 3200
        total_request_tokens: 67200
        max_context_tokens: 128000
        remaining_context_tokens: 60800
        tool_result_chars: 4096
        tool_result_tokens: 1024
        truncated_tool_results: 1
        tool_result_artifacts: 1
        exposed_tools: 12
        retrieval_items: 2
        retrieval_tokens: 720
        route_scoped_tools: true
        workflow_context: strict
        closeout_visibility: full
        validation_evidence: pending
      tool_calls:
        - tool: file_read
          output: "compressed context retained target"
        - tool: file_edit
          output: "edited after compaction"
    expect:
      context_compaction_count: 1
      context_boundary_id: cb-eval-1
      context_compaction_strategy: semantic_boundary
      context_before_tokens: 122000
      context_after_tokens: 64000
      context_preserved_tail_count: 6
      runtime_diet_total_request_tokens: 67200
      runtime_diet_remaining_context_tokens: 60800
      runtime_diet_route_scoped_tools: true
      runtime_diet_workflow_context: strict
      trace_events: ["context.compact", "runtime.diet", "workflow.judgment", "workflow.plan", "tool.done"]
      tool_sequence: ["file_read", "file_edit"]

  - id: git-diff-before-final
    prompt: "修改完成前检查 git diff"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited"
        - tool: git
          output: "diff summary"
        - tool: bash
          output: "cargo test passed"
      verification_passed: true
      changed_files: ["src/lib.rs"]
    expect:
      tool_sequence: ["file_edit", "git", "bash"]
      verification_passed: true

  - id: pytest-validation-pass
    prompt: "Python 后端改动后运行 pytest 验证"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited app/service.py"
        - tool: bash
          output: "pytest passed"
      verification_passed: true
      changed_files: ["app/service.py"]
      acceptance_review_accepted: true
    expect:
      tool_sequence: ["file_edit", "bash"]
      verification_passed: true
      repair_required: false
      trace_events: ["verify.done", "reflection.pass", "acceptance.review"]

  - id: acceptance-rejects-partial-fix
    prompt: "修改后测试过了但验收发现需求只完成一半"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited src/workflow.rs"
        - tool: bash
          output: "cargo test passed"
      verification_passed: true
      changed_files: ["src/workflow.rs"]
      acceptance_review_accepted: false
    expect:
      tool_sequence: ["file_edit", "bash"]
      verification_passed: true
      repair_required: true
      trace_events: ["verify.done", "acceptance.review"]

  - id: blocked-closeout-after-no-validation
    prompt: "代码已改但验证命令没有成功运行，不要宣布完成"
    replay:
      tool_calls:
        - tool: file_edit
          output: "edited src/lib.rs"
        - tool: bash
          success: false
          output: "cargo test command unavailable"
      verification_passed: false
      changed_files: ["src/lib.rs"]
      failed_commands: ["cargo test"]
      acceptance_review_accepted: false
    expect:
      failed_tool: bash
      tool_sequence: ["file_edit", "bash"]
      verification_passed: false
      reflection_status: Blocked
      repair_required: true
      trace_events: ["verify.done", "reflection.pass", "acceptance.review"]

  - id: permission-denied-fallback-readonly
    prompt: "写文件权限被拒绝后改为给出只读诊断和补丁建议"
    replay:
      tool_calls:
        - tool: file_edit
          success: false
          output: "Permission denied: file_edit"
        - tool: file_read
          output: "read current file for readonly diagnosis"
        - tool: grep
          output: "found relevant symbol"
    expect:
      failed_tool: file_edit
      tool_sequence: ["file_edit", "file_read", "grep"]
      repair_required: false
      trace_events: ["tool.start", "tool.done"]

  - id: memory-conflict-before-planning
    prompt: "根据项目记忆继续做，但先处理互相冲突的旧设计记录"
    replay:
      workflow_judgment: true
      tool_calls:
        - tool: memory_load
          output: "retrieved conflicting project memories"
        - tool: project_list
          output: "src/engine/conversation_loop/mod.rs"
    expect:
      retrieval: memory
      recommended_tools: ["memory_load"]
      tool_sequence: ["memory_load", "project_list"]
      trace_events: ["workflow.judgment", "workflow.plan", "tool.done"]
