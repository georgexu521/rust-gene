id: weighting-p1-tool-failure-weight-feedback
title: weighting P1 C13 tool failure triggers workflow weight feedback
type: audit
eval_intent: seeded_code_change
complexity: medium
risk: medium
runtime_profile: minimum_viable_agent

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      mkdir -p fixtures/weighting_p1_workflow/src
      printf 'fn main() {\n    let x = 1\n}\n' > fixtures/weighting_p1_workflow/src/main.rs

prompt: |
  `fixtures/weighting_p1_workflow/src/main.rs` 有语法错误（缺少分号）。
  修复它并验证 `cargo check` 通过。

allowed_tools:
  - file_read
  - file_edit
  - bash
  - grep

forbidden_tools:
  - file_write
  - git_push
  - agent
  - mcp

expected_behavior:
  - Agent 读取文件，识别语法错误，编辑修复。
  - 至少一次 tool failure（如 cargo check 失败）触发 weight feedback。
  - WorkflowPlanProgress trace 显示 reweighted=true。
  - 修复后 `cargo check` 通过。

behavior_assertions:
  - tool_failure_weight_feedback
  - workflow_plan_reweighted

runtime_spine_assertions:
  required_events:
    - action_decision
    - action_review
    - tool_observation
    - workflow_plan
  workflow_reweighted: true
  verification_passed: true

acceptance:
  required_commands: []
  harness_commands:
    - test -f fixtures/weighting_p1_workflow/src/main.rs
  diff_constraints:
    max_files_changed: 1
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Did a tool failure trigger weight feedback?
    - Was the fix verified by cargo check?

scoring:
  success: 0.30
  workflow_feedback: 0.30
  repair_quality: 0.20
  verification: 0.20
