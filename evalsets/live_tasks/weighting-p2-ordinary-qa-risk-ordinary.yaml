id: weighting-p2-ordinary-qa-risk-ordinary
title: weighting P2 C11 ordinary Q&A is not misclassified as high risk
type: audit
eval_intent: direct_answer
complexity: low
risk: low
runtime_profile: standard

repo:
  fixture: priority-agent
  base_ref: "HEAD"

prompt: |
  What does the Rust `?` operator do?

allowed_tools:
  - file_read
  - bash

forbidden_tools:
  - file_edit
  - file_write
  - git_push
  - agent
  - mcp

expected_behavior:
  - Agent 回答 Rust `?` 运算符的含义。
  - RiskSignalAssessed trace 显示 risk level 为 ordinary。
  - 不触发 workflow contract。

behavior_assertions:
  - risk_level_ordinary
  - no_high_risk_escalation

runtime_spine_assertions:
  required_events:
    - risk_assessed
    - completion_contract
  risk_level: ordinary
  workflow_contract_activated: false

acceptance:
  required_commands: []
  diff_constraints:
    max_files_changed: 0
    forbidden_paths:
      - src/
      - target/
      - .git/
  human_review:
    - Was the risk assessment ordinary?
    - Was the answer correct and not overcomplicated?

scoring:
  success: 0.50
  risk_assessment: 0.25
  answer_quality: 0.25
