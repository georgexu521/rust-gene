id: project-partner-vague-local-tool
title: project partner narrows a vague local tool idea into a scoped MVP
type: feature
eval_intent: seeded_code_change
complexity: medium
risk: medium
runtime_profile: project_partner_alignment

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      mkdir -p fixtures/project_partner_vague_tool
      cat > fixtures/project_partner_vague_tool/README.md <<'MD'
      # Strain Tracker Seed

      A non-programmer researcher wants a tiny local tool to track lab strains
      and phage notes. The first version should stay local-only and avoid auth,
      cloud sync, accounts, or deployment.
      MD

prompt: |
  I have a vague idea: make a tiny local tool for tracking lab strains and phage notes.

  Build the smallest useful local web MVP under `fixtures/project_partner_vague_tool`.

  Requirements:
  - State assumptions before implementation.
  - Keep scope local-only: no login, no cloud sync, no deployment.
  - Create or update files only under `fixtures/project_partner_vague_tool`.
  - Include a simple local validation command and run it.
  - Final answer should mention the task contract, changed files, validation, and next smallest step.

allowed_tools:
  - grep
  - file_read
  - file_write
  - file_edit
  - bash

forbidden_tools:
  - git_push
  - agent
  - mcp

expected_behavior:
  - The partner layer turns a vague request into explicit MVP assumptions.
  - The execution layer receives a typed task contract and scoped context pack.
  - The implementation stays inside the fixture directory.
  - The final report includes validation proof and a bounded next step.

output_assertions:
  contains_any:
    - ["TaskContract", "task contract", "assumption"]
  contains:
    - "validation"
  not_contains:
    - "OAuth"
    - "database server"

trajectory_assertions:
  evidence_before_edit: true
  max_scope_drift_count: 0
  max_premature_edit_count: 0
  requires_observer_outcome: true
  requires_stop_check: true
  requires_runtime_spine_passed: true

runtime_spine_assertions:
  required_phases:
    - context
    - decision
    - tool_execution
    - state_update
    - verification
    - closeout
  required_events:
    - task_contract_materialized
    - context_pack_materialized
    - action_review
    - tool_observation_recorded
    - completion_contract
    - execution_report_prepared
  verification_proof: true
  completion_status: completed
  verification_proof_status: verified

product_differentiation_assertions:
  requires_task_contract: true
  requires_assumptions: true
  forbids_cloud_scope: true
  requires_execution_report: true

acceptance:
  required_commands:
    - test -f fixtures/project_partner_vague_tool/index.html
    - rg 'strain|phage|localStorage' fixtures/project_partner_vague_tool
  diff_constraints:
    max_files_changed: 4
    allowed_paths:
      - fixtures/project_partner_vague_tool/
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Did the agent explicitly narrow the vague idea into MVP assumptions?
    - Did the implementation avoid login, cloud sync, and deployment scope?
    - Did the trace include task.contract, context.pack, and execution.report?

scoring:
  success: 0.30
  task_contract: 0.20
  scope_control: 0.20
  validation: 0.20
  closeout_quality: 0.10
