id: memory-save-duplicate-demotion
title: duplicate memory candidates should not pollute long-term memory
type: bug_fix
complexity: medium
risk: medium

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  setup:
    - cargo test -q memory -- --test-threads=1

prompt: |
  强化重复记忆候选的处理。

  要求：
  - 当候选记忆和已有长期记忆语义/文本高度重复时，不应再次写入长期记忆。
  - duplicate/demote outcome 要能被 /save 和 memory_save 用户看见。
  - duplicate 不能被 explicit=true 直接提升为 accepted。
  - 增加覆盖重复候选、近似重复候选和不同 scope 候选的测试。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - memory_clear
  - git_push

expected_behavior:
  - 重复候选返回 duplicate 或 proposed/demoted，不污染长期记忆。
  - 不同 namespace/scope 的相关记忆不会被误判为重复。
  - MemoryWriteScore 的 novelty / redundancy 因子参与决策。

acceptance:
  required_commands:
    - cargo test -q memory -- --test-threads=1
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - duplicate 判定是否足够严格但不过度？
    - 用户反馈是否解释真实 outcome？

scoring:
  success: 0.35
  test_pass: 0.20
  duplicate_gate_correctness: 0.25
  namespace_precision: 0.10
  diff_discipline: 0.10
