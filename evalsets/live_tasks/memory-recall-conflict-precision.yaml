id: memory-recall-conflict-precision
title: memory recall should demote only relevant conflicts
type: bug_fix
eval_intent: audit_or_regression_check
capability_level: 2
complexity: medium
risk: high

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  setup:
    - cargo test -q retrieval_context -- --test-threads=1

prompt: |
  强化记忆检索中的冲突匹配精度。

  要求：
  - conflict matching 不能因为 memory、project、value、key 这类泛词误伤无关记忆。
  - 结构化 conflict 应按 key/value/source 或具体冲突值匹配。
  - 高关键词命中的冲突记忆应被 cap/demote，不应注入 prompt。
  - 增加覆盖泛词误触发、结构化冲突、无关高分记忆的测试。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - memory_clear
  - git_push

expected_behavior:
  - 无关记忆不会因为泛词冲突被降级。
  - 真实冲突记忆即使命中关键词也无法进入 inject range。
  - recall reason 中能看出 conflict/demotion 原因。

behavior_assertions:
  - memory_conflict_precision
  - memory_recall_demotion

acceptance:
  required_commands:
    - cargo test -q retrieval_context -- --test-threads=1
    - "cargo test -q memory::recall::tests:: -- --test-threads=1"
  harness_commands:
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - conflict 匹配是否基于具体证据？
    - recall 分数是否避免伪 semantic 重复加权？

scoring:
  success: 0.35
  test_pass: 0.20
  recall_precision: 0.25
  conflict_safety: 0.10
  diff_discipline: 0.10
