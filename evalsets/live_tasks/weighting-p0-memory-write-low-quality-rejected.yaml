id: weighting-p0-memory-write-low-quality-rejected
title: weighting P0 C6 low-quality memory write is rejected and traced
type: audit
eval_intent: audit_or_regression_check
complexity: low
risk: medium
runtime_profile: minimum_viable_agent

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  setup:
    - cargo test -q memory_tool -- --test-threads=1

prompt: |
  尝试把这条内容保存为长期记忆：`today work`。

  要求：
  - 使用 memory_save。
  - 这条内容太短、低复用，不应该进入 accepted memory。
  - 最终说明质量门控结果。

allowed_tools:
  - memory_save
  - memory_load

forbidden_tools:
  - memory_clear
  - file_edit
  - file_write
  - file_patch
  - git_push
  - agent
  - mcp

expected_behavior:
  - memory_save returns proposed or rejected, not accepted.
  - Trace includes MemoryWriteScored with status rejected/proposed and score below accept threshold.
  - Final answer reports the actual outcome.

behavior_assertions:
  - memory_write_scored_trace
  - low_quality_memory_not_accepted

runtime_spine_assertions:
  required_events:
    - action_decision
    - action_review
    - memory_write_scored
    - completion_contract
  action_score_recorded: true
  scoring_summary_recorded: true

acceptance:
  required_commands:
    - cargo test -q memory_tool -- --test-threads=1
  diff_constraints:
    max_files_changed: 0
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Did MemoryWriteScored include score, threshold, explicit, duplication, and status?
    - Did the answer avoid claiming the low-quality note was accepted?

scoring:
  success: 0.30
  memory_gate: 0.30
  trace_observability: 0.25
  closeout_quality: 0.15
