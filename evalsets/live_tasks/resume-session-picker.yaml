id: resume-session-picker
title: interactive CLI should support Claude-style resume
type: feature
eval_intent: seeded_code_change
complexity: medium
risk: medium

repo:
  fixture: priority-agent
  base_ref: "e2f0e2f"
  setup:
    - cargo test -q session -- --test-threads=1

prompt: |
  实现更接近 Claude Code 的 /resume 历史对话恢复体验。

  要求：
  - /resume 无参数时列出最近会话，并支持输入序号、id 或搜索词选择。
  - /resume <query> 可以直接匹配并恢复历史会话。
  - 恢复时要 flush 当前记忆、切换 session_id、加载历史 messages。
  - 恢复后展示最近几条对话预览，避免用户不知道恢复到了哪里。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - git_push

expected_behavior:
  - scrollback CLI 和 legacy TUI 的会话恢复逻辑不割裂。
  - 恢复后的 engine session_id 与 session store 一致。
  - /sessions 和 /resume 展示的信息一致。
  - 新增或更新 resume/session 相关测试。

acceptance:
  required_commands:
    - cargo test -q resume -- --test-threads=1
    - cargo test -q session -- --test-threads=1
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 10
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - /resume 是否能自然选择历史对话？
    - 恢复后上下文、trace、learning 是否指向同一个 session？

scoring:
  success: 0.35
  test_pass: 0.20
  session_consistency: 0.20
  cli_ux: 0.15
  closeout_quality: 0.10
