id: core-simple-stale-edit
title: read before a focused single-file edit
type: bug_fix
eval_intent: seeded_code_change
complexity: low
risk: medium

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      mkdir -p fixtures/core_quality/simple_edit
      cat > fixtures/core_quality/simple_edit/settings.py <<'PY'
      DEFAULT_TIMEOUT = 3


      def request_timeout():
          return DEFAULT_TIMEOUT
      PY
      cat > fixtures/core_quality/simple_edit/test_settings.py <<'PY'
      import unittest
      import settings


      class SettingsTest(unittest.TestCase):
          def test_timeout_default_is_ten_seconds(self):
              self.assertEqual(settings.request_timeout(), 10)


      if __name__ == "__main__":
          unittest.main()
      PY

prompt: |
  修复 `fixtures/core_quality/simple_edit/settings.py` 中的默认请求超时时间。

  要求：
  - 先读取目标文件，再做最小单点修改。
  - 不要重写整个文件。
  - 修改后运行对应测试。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - file_write
  - git_push

expected_behavior:
  - The agent reads the file before editing it.
  - The edit is minimal and preserves surrounding code.
  - The required test passes after the edit.

runtime_spine_assertions:
  required_phases:
    - context
    - decision
    - tool_execution
    - state_update
    - closeout
  required_events:
    - action_decision
    - stop_check
  verification_proof: true

core_quality:
  group: core-coding-quality
  failure_owner_hints:
    - file_state
    - llm_reasoning
  reference_points:
    claude_opencode: "A mature coding agent reads state, makes a narrow edit, then validates."
    priority_agent_acceptance: "file_edit stale-read protection and focused validation should carry the hard constraint."

acceptance:
  required_commands:
    - python3 fixtures/core_quality/simple_edit/test_settings.py
    - rg 'DEFAULT_TIMEOUT = 10' fixtures/core_quality/simple_edit/settings.py
  diff_constraints:
    max_files_changed: 2
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Was the first write preceded by a read of the same file?
    - Did the agent avoid broad rewrite churn?

scoring:
  success: 0.35
  test_pass: 0.25
  file_state: 0.20
  diff_discipline: 0.10
  closeout_quality: 0.10
