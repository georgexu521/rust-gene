id: weighting-p0-budget-exceeded-deny
title: weighting P0 C3 budget exhaustion denies further tool calls
type: audit
eval_intent: audit_or_regression_check
complexity: medium
risk: medium
runtime_profile: minimum_viable_agent

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      mkdir -p fixtures/weighting_p0_budget
      for i in $(seq 1 5); do
        echo "step ${i}: pending" > "fixtures/weighting_p0_budget/status_${i}.txt"
      done

prompt: |
  依次检查 `fixtures/weighting_p0_budget/status_1.txt` 到
  `status_5.txt`，报告每个文件的内容。逐个文件执行，每个文件单独一次工具调用。
  在每次工具调用之间，必须停顿思考后再继续下一个，以确保每个调用都是独立步。

allowed_tools:
  - file_read
  - bash

forbidden_tools:
  - file_edit
  - file_write
  - file_patch
  - git_push
  - agent
  - mcp

expected_behavior:
  - 如果 total_iterations 超过 MVA 预算（默认 10），budget gate 会 deny 后续工具调用。
  - Agent 在处理过程中可能提前耗尽 budget。
  - 不修改任何文件。

runtime_spine_assertions:
  required_phases:
    - context
    - decision
    - tool_execution
    - state_update
    - closeout
  required_events:
    - action_decision
    - stop_check
  verification_proof: false

acceptance:
  required_commands: []
  harness_commands:
    - test -f fixtures/weighting_p0_budget/status_1.txt
    - for f in fixtures/weighting_p0_budget/status_*.txt; do test -f "$f"; done
  diff_constraints:
    max_files_changed: 0
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - Did ActionReview deny any action with budget_allowed=false near iteration limit?
    - Did the agent avoid infinite tool loops?

scoring:
  success: 0.25
  budget_gate: 0.35
  no_looping: 0.25
  closeout_quality: 0.15
