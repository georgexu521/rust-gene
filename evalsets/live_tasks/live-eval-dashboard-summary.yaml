id: live-eval-dashboard-summary
title: live eval reports should summarize pass rates and failure modes
type: feature
eval_intent: seeded_code_change
complexity: medium
risk: medium

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      python3 - <<'PY'
      from pathlib import Path
      from textwrap import dedent

      path = Path("scripts/run_live_eval.sh")
      text = path.read_text()
      start = text.find("\nsummary_task() {\n")
      end = text.find("\nrun_one() {", start)
      if start < 0 or end < 0:
          raise SystemExit("expected summary_task function was not found")
      stub = dedent('''
      summary_task() {
        local run_report_dir="$REPORT_DIR/live-$RUN_ID"
        local summary="$run_report_dir/summary.md"
        mkdir -p "$run_report_dir"
        echo "summary mode is not implemented yet" >&2
        echo "# Live Eval Summary: $RUN_ID" >"$summary"
        echo "" >>"$summary"
        echo "- status: not_implemented" >>"$summary"
        return 2
      }
      ''')
      text = text[:start] + "\n" + stub + text[end:]
      if "--mode summary" not in text or "summary_task" not in text:
          raise SystemExit("summary mode entrypoint unexpectedly missing")
      path.write_text(text)
      PY
  setup:
    - bash -n scripts/run_live_eval.sh

prompt: |
  为 live eval 增加汇总报告能力，方便长期对标 Claude Code / Codex。

  当前 seeded worktree 已保留 `scripts/run_live_eval.sh --mode summary` 入口，
  但 `summary_task()` 被替换成了未实现 stub。请优先修改
  `scripts/run_live_eval.sh` 里的 `summary_task()`，不要停在检查脚本状态。

  要求：
  - 对一个 run-id 下的任务生成 summary.md。
  - 汇总每个任务的 plan lint、HTTP/API 状态、required command 状态、主要失败模式。
  - 报告要区分 plan-only 通过和真实 code-change 通过，不能混淆。
  - 增加脚本帮助文档或测试，保证 summary 生成可重复。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - git_push

expected_behavior:
  - "`scripts/run_live_eval.sh` 或配套脚本能生成 run summary。"
  - summary 明确标注 plan_quality、tool_boundary、verification_status。
  - 报告可作为 memory/skill/evolution 的训练信号入口。

acceptance:
  required_commands:
    - bash -n scripts/run_live_eval.sh
    - scripts/run_live_eval.sh --list
    - scripts/run_live_eval.sh --mode summary --run-id live-summary-smoke
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - 报告是否能一眼看出失败模式？
    - 是否避免把 plan-only 当成真实完成？

scoring:
  success: 0.35
  test_pass: 0.15
  report_usefulness: 0.30
  benchmark_alignment: 0.10
  diff_discipline: 0.10
