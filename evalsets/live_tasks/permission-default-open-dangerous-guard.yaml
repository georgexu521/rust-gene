id: permission-default-open-dangerous-guard
title: default-open permissions should still guard destructive operations
type: bug_fix
complexity: medium
risk: high

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  setup:
    - cargo test -q permissions -- --test-threads=1

prompt: |
  验证并强化默认开放权限模式下的危险操作保护。

  要求：
  - 默认应减少低风险开发操作确认，接近 Claude/Codex 的顺滑体验。
  - rm -rf、删除系统目录、git push、覆盖大量文件、泄露密钥等危险操作仍必须 ask/block。
  - PermissionContext 和 Tool::requires_confirmation 必须统一参与判断。
  - 增加默认开放模式下的危险命令/安全命令对照测试。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - git_push

expected_behavior:
  - low-risk read/list/test operations can proceed without noisy confirmation.
  - destructive or irreversible operations are still gated.
  - git/worktree/github special cases不能绕过统一权限判定。

acceptance:
  required_commands:
    - cargo test -q permissions -- --test-threads=1
    - cargo test -q tools::bash_tool -- --test-threads=1
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 10
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - 是否降低了无意义打扰？
    - 是否仍能挡住真正危险操作？

scoring:
  success: 0.35
  test_pass: 0.20
  permission_safety: 0.25
  developer_flow: 0.10
  diff_discipline: 0.10
