id: memory-save-sensitive-hard-block
title: explicit memory saves must not persist sensitive data
type: bug_fix
complexity: medium
risk: high

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  setup:
    - cargo test -q memory -- --test-threads=1

prompt: |
  强化记忆保存的安全硬门槛。

  要求：
  - 即使用户显式 /save，也不能保存 API key、token、password、private key 等敏感内容。
  - memory_save 工具调用和 /save 用户命令都必须返回真实 outcome。
  - blocked outcome 要说明是 safety/sensitivity gate，而不是笼统失败。
  - 增加覆盖 explicit save + sensitive content 的测试。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - memory_clear
  - git_push

expected_behavior:
  - sensitive candidate 被 blocked，不进入长期 MEMORY.md / USER.md。
  - explicit override 不绕过 sensitivity hard limit。
  - 用户可见反馈包含 blocked/status/reason。
  - 测试覆盖模型工具保存和用户显式保存两条路径。

acceptance:
  required_commands:
    - cargo test -q memory -- --test-threads=1
    - cargo test -q tui::app::tests:: -- --test-threads=1
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - 敏感内容是否永远不会被 accepted？
    - blocked 原因是否足够可观测？
    - 是否避免把测试密钥写入真实用户记忆文件？

scoring:
  success: 0.35
  test_pass: 0.20
  safety_gate_correctness: 0.25
  observability: 0.10
  diff_discipline: 0.10
