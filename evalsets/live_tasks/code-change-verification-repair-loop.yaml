id: code-change-verification-repair-loop
title: failed verification should trigger repair before closeout
type: feature
eval_intent: seeded_code_change
capability_level: 5
complexity: high
risk: high

repo:
  fixture: priority-agent
  base_ref: "HEAD"
  prepare_commands:
    - |
      python3 - <<'PY'
      from pathlib import Path
      import re

      path = Path("src/engine/conversation_loop/repair_controller.rs")
      text = path.read_text()
      pattern = re.compile(
          r'post_edit_reflection\.record_repair_action\(\s*'
          r'context\.acceptance_repair_attempts \+ 1,\s*'
          r'"repair failed verification before closeout",\s*'
          r'context\s*\.\s*changed_files\s*\.\s*first\(\)\s*\.\s*map\(\|path\| path\.display\(\)\.to_string\(\)\),\s*'
          r'verification_command,\s*'
          r'\);',
          re.MULTILINE,
      )
      new = '''post_edit_reflection.record_repair_action(
                context.acceptance_repair_attempts + 1,
                &format!("retry: {}", verification_command),
                context.changed_files.first().map(|path| path.display().to_string()),
            );'''
      text, count = pattern.subn(new, text, count=1)
      if count != 1:
          raise SystemExit("expected record_repair_action call shape was not found")
      path.write_text(text)
      PY
  setup:
    - cargo test -q reflection_pass -- --test-threads=1

prompt: |
  修复真实 code-change workflow 的验证-修复闭环回归。

  当前 fixture 故意在 repair controller 中引入了一个编译错误：`record_repair_action` 调用缺少 verification command 参数。
  请先修复这个回归，再确认验证失败会被记录为 repair action，且不会在失败时给出成功 closeout。

  要求：
  - 如果代码修改后的 required command 失败，agent 不应直接 closeout。
  - ReflectionPass / verification trace 要记录失败命令、失败摘要和下一步 repair action。
  - 修复 `record_repair_action` 时不要保留 `&format!("retry: {}", verification_command)` 这个临时 action 文本；应恢复为稳定的 repair action 描述，并单独传入 verification command。
  - repair 后要重新运行相关命令，并在最终 closeout 中列出验证状态。
  - 增加一个失败验证触发 repair 的回归测试或 eval replay。

allowed_tools:
  - grep
  - file_read
  - file_edit
  - bash

forbidden_tools:
  - git_push

expected_behavior:
  - failed verification blocks success closeout.
  - repair loop has bounded attempts and visible trace.
  - final response cannot claim tests passed if tests failed.

runtime_spine_assertions:
  required_phases:
    - context
    - decision
    - tool_execution
    - state_update
    - verification
    - closeout
  required_events:
    - action_decision
    - stop_check
  verification_proof: true

acceptance:
  required_commands:
    - cargo test -q reflection_pass -- --test-threads=1
    - cargo test -q evalset -- --test-threads=1
    - "! rg '&format!\\(\"retry: \\{\\}\", verification_command\\)' src/engine/conversation_loop/repair_controller.rs"
    - "rg 'record_repair_action\\(' src/engine/conversation_loop/repair_controller.rs"
  harness_commands:
    - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 12
    forbidden_paths:
      - target/
      - .git/
  human_review:
    - closeout 是否被失败验证阻断？
    - repair 是否有边界，不会无限循环？
    - trace 是否足够复盘？

scoring:
  success: 0.35
  test_pass: 0.20
  repair_loop_correctness: 0.25
  trace_observability: 0.10
  diff_discipline: 0.10
