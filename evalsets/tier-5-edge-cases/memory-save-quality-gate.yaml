id: memory-save-quality-gate
title: memory_save should respect quality gates
type: bug_fix
eval_intent: seeded_code_change
complexity: medium
risk: high
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "python3 - <<'PY'\nfrom pathlib import Path\n\nmemory_tool = Path(\"src/tools/memory_tool/mod.rs\"\
    )\ntext = memory_tool.read_text()\ntext = text.replace(\n    \"assess_memory_candidate(content,\
    \ category, &existing, false)\",\n    \"assess_memory_candidate(content, category,\
    \ &existing, true)\",\n)\nmemory_tool.write_text(text)\n\nquality = Path(\"src/memory/quality.rs\"\
    )\ntext = quality.read_text()\ntext = text.replace(\n    \"let write_decision\
    \ = score_memory_write(write_factors, sensitivity, duplication, explicit);\\n\
    \    let score = write_decision.score;\\n    let status = write_decision.status;\"\
    ,\n    \"let write_decision = score_memory_write(write_factors, sensitivity, duplication,\
    \ explicit);\\n    let score = write_decision.score;\\n    let status = if explicit\
    \ || score >= 0.65 { MemoryStatus::Accepted } else { write_decision.status };\"\
    ,\n)\nquality.write_text(text)\n\nimport re\n\napp = Path(\"src/tui/app.rs\")\n\
    text = app.read_text()\ndef stale_save(match: re.Match) -> str:\n    block = match.group(1)\n\
    \    block = block.replace(\".await\\n\", \".await;\\n\")\n    return f\"match\
    \ save_target {{{block}}}\\n                            format!(\\\"Saved: {{}}\\\
    \", save_content)\"\n\ntext, count = re.subn(\n    r'''(?ms)let outcome = match\
    \ save_target \\{(.*?)\\};\\s*format_memory_write_outcome\\(save_content, &outcome\\\
    )''',\n    stale_save,\n    text,\n)\nif count != 2:\n    raise SystemExit(f\"\
    expected to reintroduce two /save unconditional outcomes, replaced {count}\")\n\
    app.write_text(text)\nPY\n"
  setup:
  - cargo test -q memory -- --test-threads=1
prompt: '修复 memory_save 绕过记忆质量门控的问题。


  要求：

  - 模型调用 memory_save 时必须按普通候选走 MemoryWriteScore 门控。

  - 只有用户显式 /save 才能走 explicit override。

  - explicit override 也不能绕过 sensitivity、volatility、duplication 这类硬性限制。

  - 保存结果必须能告诉用户真实 outcome，而不是无条件显示 Saved。

  - /save 的修复目标是 src/tui/app.rs 的斜杠命令处理逻辑，不要通过修改 src/tui/tool_view.rs 的工具展示文案来满足。

  '
allowed_tools:
- grep
- file_read
- file_edit
- bash
forbidden_tools:
- memory_clear
- git_push
expected_behavior:
- memory_save 不再用 explicit=true 直接写入长期记忆。
- MemoryQualityAssessment 的 explicit 只降低阈值或进入 proposed，不直接 Accepted。
- /save 能展示 accepted/proposed/rejected/blocked/duplicate 等结果。
- 新增或更新覆盖质量门控的测试。
behavior_assertions:
- memory_quality_gate
- memory_save_outcome_visibility
acceptance:
  required_commands:
  - cargo test -q memory -- --test-threads=1
  - '! rg ''assess_memory_candidate\(content, category, &existing, true\)'' src/tools/memory_tool/mod.rs'
  - '! rg ''let status = if explicit \|\| score >= 0\.65'' src/memory/quality.rs'
  - '! rg ''format!\("Saved: \{\}'' src/tui/app.rs'
  - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
    - target/
    - .git/
    - src/tui/tool_view.rs
  human_review:
  - 是否区分了模型工具保存和用户显式保存？
  - 数学门控是否真的参与写入决策？
  - 最终用户提示是否和真实写入状态一致？
scoring:
  success: 0.4
  test_pass: 0.2
  memory_gate_correctness: 0.2
  diff_discipline: 0.1
  closeout_quality: 0.1
tier: tier-5-edge-cases
