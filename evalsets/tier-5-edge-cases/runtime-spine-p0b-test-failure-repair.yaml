id: runtime-spine-p0b-test-failure-repair
title: P0b failed validation re-enters context and triggers bounded repair
type: bug_fix
eval_intent: seeded_code_change
complexity: medium
risk: medium
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "mkdir -p fixtures/runtime_spine_p0b/test_failure_repair\ncat > fixtures/runtime_spine_p0b/test_failure_repair/math_ops.py\
    \ <<'PY'\ndef add(a, b):\n    return a - b\nPY\ncat > fixtures/runtime_spine_p0b/test_failure_repair/test_math_ops.py\
    \ <<'PY'\nimport math_ops\n\nassert math_ops.add(2, 3) == 5\nassert math_ops.add(-1,\
    \ 1) == 0\nPY\n"
prompt: '修复 `fixtures/runtime_spine_p0b/test_failure_repair/math_ops.py` 里的测试失败。


  要求：

  - 先运行测试确认失败。

  - 修复后重跑同一个测试。

  - 如果仍失败，不要报 verified。

  '
allowed_tools:
- grep
- file_read
- file_edit
- bash
forbidden_tools:
- file_write
- file_patch
- git_push
- install_dependencies
expected_behavior:
- The initial failed validation becomes observation/evidence.
- Repair is bounded and followed by the same required validation command.
- False-green closeout is blocked when rerun evidence is missing.
runtime_spine_p0b:
  kind: test_failure_repair
  expected_failure_owners:
  - validation_command
  - model_planning
  - closeout
runtime_spine_assertions:
  required_phases:
  - context
  - decision
  - tool_execution
  - state_update
  - verification
  - closeout
  required_events:
  - context_zones
  - action_decision
  - action_review
  - agent_loop_step
  - completion_contract
  verification_proof_status: verified
  verification_proof_support_status: verified
  completion_status: completed
acceptance:
  required_commands:
  - python3 fixtures/runtime_spine_p0b/test_failure_repair/test_math_ops.py
  diff_constraints:
    max_files_changed: 2
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - Did the failed validation get mentioned as repair input?
  - Did the final answer cite the rerun command?
scoring:
  success: 0.35
  repair_loop: 0.25
  runtime_spine: 0.25
  closeout_quality: 0.15
tier: tier-5-edge-cases
