id: core-long-output-artifact
title: preserve and inspect long command output
type: runtime
eval_intent: audit_or_regression_check
complexity: medium
risk: medium
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "mkdir -p fixtures/core_quality/long_output\ncat > fixtures/core_quality/long_output/generate_log.py\
    \ <<'PY'\nfor i in range(1, 801):\n    if i == 537:\n        print(\"line 0537\
    \ ERROR_ANCHOR payment retry budget exceeded\")\n    else:\n        print(f\"\
    line {i:04d} ok\")\nPY\n"
prompt: '运行 `fixtures/core_quality/long_output/generate_log.py`，找出包含 `ERROR_ANCHOR`
  的关键行。


  要求：

  - 不要把超长输出全部塞进最终回答。

  - 将完整输出保存到 `fixtures/core_quality/long_output/output.log`。

  - 再读取或 grep 关键片段，最终只汇报关键行和验证命令。

  '
allowed_tools:
- bash
- file_read
forbidden_tools:
- file_edit
- file_write
- file_patch
- git_push
expected_behavior:
- Long output is persisted as an artifact.
- The answer is based on the artifact, not guessed from truncated output.
- Final response stays concise.
core_quality:
  group: core-coding-quality
  failure_owner_hints:
  - terminal_runtime
  - tool_contract
  reference_points:
    claude_opencode: Long terminal output should be summarized from stored artifacts.
    priority_agent_acceptance: bash tool result storage and follow-up reads should
      prevent context flooding.
acceptance:
  required_commands:
  - test -s fixtures/core_quality/long_output/output.log
  - rg 'line 0537 ERROR_ANCHOR payment retry budget exceeded' fixtures/core_quality/long_output/output.log
  - python3 -c 'from pathlib import Path; assert len(Path("fixtures/core_quality/long_output/output.log").read_text().splitlines())
    == 800'
  diff_constraints:
    max_files_changed: 1
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - Did the final answer avoid pasting the whole log?
  - Was the key line read from the saved artifact?
scoring:
  success: 0.35
  long_output_handling: 0.3
  tool_grounding: 0.15
  closeout_quality: 0.1
  scope_safety: 0.1
tier: tier-5-edge-cases
