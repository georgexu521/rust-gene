id: skill-promotion-gate
title: skill apply should require promotion evidence
type: bug_fix
eval_intent: seeded_code_change
complexity: medium
risk: medium
repo:
  fixture: priority-agent
  base_ref: HEAD
  prepare_commands:
  - "python3 - <<'PY'\nfrom pathlib import Path\nimport re\n\npath = Path(\"src/tui/slash_handler/learning.rs\"\
    )\ntext = path.read_text()\n\ngate_pattern = re.compile(\n    r'\\n          \
    \  if let Err\\(report\\) = validate_skill_promotion_for_apply\\(&store, &current,\
    \ bound_report\\.as_ref\\(\\)\\) \\{\\n'\n    r'                return format!\\\
    (\\n'\n    r'                    \"Skill proposal \\{\\} was not applied by promotion\
    \ gate\\.\\\\n\\{\\}\",\\n'\n    r'                    current\\.id, report\\\
    n'\n    r'                \\);\\n'\n    r'            \\}\\n',\n    re.MULTILINE,\n\
    )\ntext, gate_count = gate_pattern.subn(\"\\n\", text, count=1)\nif gate_count\
    \ != 1:\n    raise SystemExit(\"expected promotion gate block not found\")\n\n\
    cooldown_pattern = re.compile(\n    r'\\n                        record_evolution_update\\\
    (\\n'\n    r'                            crate::engine::evolution_controller::EvolutionTarget::Skill,\\\
    n'\n    r'                        \\);\\n',\n    re.MULTILINE,\n)\ntext, cooldown_count\
    \ = cooldown_pattern.subn(\"\\n\", text, count=1)\nif cooldown_count != 1:\n \
    \   raise SystemExit(\"expected skill cooldown update block not found\")\n\npath.write_text(text)\n\
    PY\n"
  setup:
  - cargo test -q skill_evolution -- --test-threads=1
prompt: '修复 /skill-proposals apply 没有强制使用 fitness promotion gate 的问题。


  要求：

  - 覆盖已有 skill 时必须调用 compare_skill_versions_for_promotion。

  - 首次激活 skill 可以没有 baseline，但要明确记录例外原因。

  - replacement 必须检查 fitness delta、regression rate、eval count、risk penalty、semantic
  drift。

  - apply/rollback/restore 要和 EvolutionController 的冷却状态衔接。

  '
allowed_tools:
- grep
- file_read
- file_edit
- bash
forbidden_tools:
- git_push
expected_behavior:
- 已有 skill 的替换不能绕过 promotion gate。
- 无 baseline 的首次激活路径有明确审计文字。
- 失败 gate 时不会写入用户 skill。
- 新增或更新 skill proposal / fitness / gate 测试。
behavior_assertions:
- skill_promotion_gate
- skill_evolution_cooldown
acceptance:
  required_commands:
  - cargo test -q skill_evolution -- --test-threads=1
  - cargo test -q slash_handler -- --test-threads=1
  - python3 -c "import re; p='src/tui/slash_handler/learning.rs'; s=open(p).read();
    h=s.find('pub fn handle_skill_proposals'); a=s.find('\"apply\" =>', h); b=s.find('let
    root = user_skill_root()', a); m=re.search(r'validate_skill_promotion_for_apply\\(\\s*&store,\\s*&current,\\s*bound_report\\.as_ref\\(\\)\\s*\\)',
    s[a:b]); assert h >= 0 and a >= 0 and b >= 0 and m"
  - python3 -c "p='src/tui/slash_handler/learning.rs'; s=open(p).read(); h=s.find('pub
    fn handle_skill_proposals'); a=s.find('\"apply\" =>', h); r=s.find('store.record_applied_version(id,
    &path)', a); b=s.find('let loaded = app.skill_runtime.reload()', r); c=s.find('record_evolution_update(',
    r); assert h >= 0 and a >= 0 and r >= 0 and b >= 0 and c >= 0 and c < b"
  - cargo test -q -- --test-threads=1
  diff_constraints:
    max_files_changed: 8
    forbidden_paths:
    - target/
    - .git/
  human_review:
  - promotion gate 是否是硬门槛？
  - 首次激活和替换已有 skill 是否语义清晰？
  - rollback 指针是否可审计？
scoring:
  success: 0.35
  test_pass: 0.2
  promotion_gate_correctness: 0.25
  rollback_safety: 0.1
  closeout_quality: 0.1
tier: tier-5-edge-cases
